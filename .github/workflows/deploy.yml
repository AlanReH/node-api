name: Deploy Node API

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/node-api

            echo "📥 Force sync repo"
            git fetch origin
            git reset --hard origin/main

            echo "🐳 Rebuild node WITHOUT cache"
            docker compose build --no-cache node-api
            docker compose up -d node-api

            echo "🧹 Clean unused images"
            docker system prune -f

            echo "✅ Node deployed successfully - $(date)"