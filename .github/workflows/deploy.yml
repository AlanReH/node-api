name: Deploy Node API

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: npm install
        
      - name: Run tests
        run: npm test
        
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/node-api
            
            echo "📥 Sync repo"
            git fetch origin
            git reset --hard origin/main

            echo "🐳 Rebuild node (light)"
            docker compose build node-api

            echo "🚀 Restart"
            docker compose up -d node-api

            echo "✅ Deploy done - $(date)"